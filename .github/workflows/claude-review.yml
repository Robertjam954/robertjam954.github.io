name: Claude Auto Review

# Portfolio-wide code-quality review. Managed centrally from
# Robertjam954/project_planning_tracking_code_review - deploy or update it with
# scripts/deploy_review_workflows.sh. Requires an ANTHROPIC_API_KEY secret on
# each repo (the deploy script sets it for you).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    # Skip drafts to save review spend; they get reviewed on "ready_for_review".
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1.0.171
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request with a focus on:
            - Code quality and best practices
            - Potential bugs or issues
            - Security implications (flag any committed secrets, keys, or data)
            - Performance considerations

            Note: The PR branch is already checked out in the current working directory.
            Provide detailed feedback using inline comments for specific issues.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
